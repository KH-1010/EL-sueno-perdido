name: Scrape and Deploy to GitHub Pages

on:
  schedule:
    # Run daily at 03:00 UTC
    - cron: '0 3 * * *'
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Scraper (Archive.org -> Dub.json / Sub.json)
        run: node scraper.js

      - name: Commit scraped data if changed
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add Dub.json Sub.json .scraper-last-run
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Auto-update: Arabic Dubbed & Subbed games library [skip ci]"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No new games found."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
