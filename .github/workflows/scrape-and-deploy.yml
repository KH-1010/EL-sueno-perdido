name: 🎮 Arabic Games — Auto Scraper & Deploy

on:
  # ── تشغيل يومي الساعة 3 صباحاً (UTC) ──
  schedule:
    - cron: '0 3 * * *'

  # ── تشغيل يدوي من GitHub ──
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Deploy even if no changes'
        required: false
        default: 'false'
        type: boolean

  # ── تشغيل عند رفع ملف JSON جديد ──
  push:
    paths:
      - 'Dub.json'
      - 'Sub.json'
      - 'ps1.json'
      - 'ps2.json'
      - 'ps3.json'
      - 'index.html'
      - 'build.js'
      - 'scraper.js'

permissions:
  contents: write

jobs:
  # ════════════════════════════════════════
  # JOB 1: جلب البيانات وتحديث الملفات
  # ════════════════════════════════════════
  scrape:
    name: 🔍 Scrape archive.org
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        id: scrape
        run: |
          node scraper.js
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet Dub.json Sub.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✓ No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🆕 Changes detected!"
            git diff --stat Dub.json Sub.json
          fi

      - name: Commit changes
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "Arabic Games Bot 🤖"
          git config user.email "bot@arabic-games.auto"
          git add Dub.json Sub.json .scraper-last-run
          git commit -m "🤖 Auto-update: $(date +'%Y-%m-%d %H:%M') — تحديث تلقائي"
          git push

  # ════════════════════════════════════════
  # JOB 2: بناء ورفع على Cloudflare Workers
  # ════════════════════════════════════════
  deploy:
    name: 🚀 Build & Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: scrape
    if: |
      needs.scrape.outputs.changed == 'true' ||
      github.event_name == 'push' ||
      github.event.inputs.force_deploy == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Pull latest (in case scrape job pushed changes)
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build worker.js
        run: node build.js

      - name: Verify build
        run: |
          echo "📦 worker.js size: $(du -sh worker.js | cut -f1)"
          head -n 5 worker.js

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Deployment summary
        run: |
          echo "## 🎮 Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| worker.js | $(du -sh worker.js | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "| Dub.json | $(wc -l < Dub.json) lines |" >> $GITHUB_STEP_SUMMARY
          echo "| Sub.json | $(wc -l < Sub.json) lines |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 Site: https://ps-games-library.alshariefk.workers.dev" >> $GITHUB_STEP_SUMMARY
