name: Scrape and Deploy to GitHub Pages

on:
  schedule:
    # Run daily at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "nps-scrape"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update NoPayStation Database
        run: python update-nps.py

      - name: Run Scraper (Archive.org -> Dub.json / Sub.json)
        run: node scraper.js

      - name: Commit all updates if changed
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add resources/database/ Dub.json Sub.json .scraper-last-run
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Auto-update: NPS database + Arabic Dubbed & Subbed games [skip ci]"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No new data found."
          fi
